<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnunGo - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tecnun-blue-dark: #102a43;
            --tecnun-blue-light: #243b55;
            --tecnun-green: #4b8b70; 
            --tecnun-green-hover: #3a6b56;
            --text-light: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --bg-body: #f3f4f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-body); 
        }

        .split-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            background-color: #ffffff;
            width: 90%;
            max-width: 950px;
            min-height: 550px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* PANEL IZQUIERDO - Branding */
        .panel-left {
            background: linear-gradient(135deg, var(--tecnun-blue-dark) 0%, var(--tecnun-blue-light) 100%);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            text-align: center;
        }

        .panel-left h2 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .panel-left p {
            font-size: 0.95rem;
            font-weight: 300;
            opacity: 0.9;
            line-height: 1.6;
        }

        /* PANEL DERECHO - Selección de Rol */
        .panel-right {
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-right h1 {
            font-size: 2rem;
            color: var(--tecnun-blue-dark);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        /* Botón Usuario (Verde Tecnun) */
        .btn-user {
            background-color: var(--tecnun-green);
            color: white;
            box-shadow: 0 4px 6px rgba(75, 139, 112, 0.2);
        }

        .btn-user:hover {
            background-color: var(--tecnun-green-hover);
            transform: translateY(-2px);
        }

        /* Botón Admin (Borde Azul) */
        .btn-admin {
            background-color: transparent;
            color: var(--tecnun-blue-dark);
            border: 2px solid var(--tecnun-blue-dark);
        }

        .btn-admin:hover {
            background-color: var(--tecnun-blue-dark);
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 900px) {
            .split-container { grid-template-columns: 1fr; }
            .panel-left { min-height: 150px; padding: 30px; }
            .panel-right { padding: 40px 30px; }
        }
    </style>
</head>
<body>

    <div class="split-container">
        <div class="panel-left">
            <h2>TecnunGo</h2>
            <p>Your gateway to international academic experiences.</p>
        </div>

        <div class="panel-right">
            <h1>Welcome</h1>
            <p class="subtitle">Please select how you want to access the platform.</p>
            
            <div class="button-group">
                <a href="user_panel.html" class="btn btn-user">I am a User</a>
                <a href="admin_panel.html" class="btn btn-admin">I am an Administrator</a>
            </div>
        </div>
    </div>

</body>
</html>
